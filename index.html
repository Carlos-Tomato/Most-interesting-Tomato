<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$CARLOS — Stay Juicy</title>
  <meta name="description" content="Carlos is not just another tomato. He is the most interesting tomato in the world." />
  <style>
    :root {
      --bg: #130606;
      --bg2: #220909;
      --panel: rgba(40, 10, 10, 0.82);
      --panel-2: rgba(75, 18, 13, 0.82);
      --gold: #e6c27a;
      --gold-2: #c8963e;
      --cream: #fff4dc;
      --red: #d63b24;
      --soft: #f6dfb2;
      --line: rgba(230, 194, 122, 0.2);
      --shadow: 0 18px 60px rgba(0,0,0,0.45);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--cream);
      background:
        radial-gradient(circle at top, rgba(150,40,20,0.28), transparent 35%),
        linear-gradient(180deg, #2b0909 0%, #150707 45%, #0d0303 100%);
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(12px);
      background: rgba(16, 5, 5, 0.72);
      border-bottom: 1px solid var(--line);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .brand img {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid rgba(230, 194, 122, 0.32);
      box-shadow: 0 0 0 4px rgba(230, 194, 122, 0.07);
    }

    .navlinks {
      display: flex;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
    }

    .navlinks a {
      opacity: 0.88;
      font-size: 0.96rem;
    }

    .navlinks a:hover {
      opacity: 1;
      color: var(--gold);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 22px;
      border-radius: 999px;
      border: 1px solid rgba(230, 194, 122, 0.22);
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: linear-gradient(180deg, #f0cf8f 0%, #c59035 100%);
      color: #2b1200;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.04);
      color: var(--cream);
    }

    .hero {
      padding: 60px 0 36px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 34px;
      align-items: center;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 12px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(230, 194, 122, 0.1);
      border: 1px solid rgba(230, 194, 122, 0.16);
      color: var(--soft);
      font-size: 0.9rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(3rem, 7vw, 6.3rem);
      line-height: 0.95;
      letter-spacing: 0.01em;
      color: var(--cream);
      text-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    .hero-sub {
      font-size: clamp(1.3rem, 2vw, 2rem);
      color: var(--gold);
      margin-bottom: 18px;
    }

    .hero-copy {
      font-size: 1.12rem;
      line-height: 1.7;
      max-width: 640px;
      opacity: 0.94;
    }

    .cta-row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    .contract {
      margin-top: 24px;
      padding: 16px 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.025));
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow-wrap: anywhere;
      box-shadow: var(--shadow);
    }

    .contract-label {
      color: var(--gold);
      font-size: 0.84rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .hero-visual {
      position: relative;
    }

    .hero-card {
      position: relative;
      padding: 18px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(54, 12, 12, 0.8), rgba(21, 7, 7, 0.92));
      border: 1px solid rgba(230, 194, 122, 0.16);
      box-shadow: var(--shadow);
    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: 28px;
      padding: 1px;
      background: linear-gradient(180deg, rgba(230,194,122,0.28), rgba(230,194,122,0.05));
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      pointer-events: none;
    }

    .hero-main-img {
      width: 100%;
      display: block;
      border-radius: 22px;
    }

    .section {
      padding: 34px 0;
    }

    .section-title {
      font-size: clamp(2rem, 4vw, 3.2rem);
      margin: 0 0 12px;
      color: var(--cream);
    }

    .section-sub {
      color: rgba(255, 244, 220, 0.82);
      max-width: 760px;
      line-height: 1.7;
      margin-bottom: 22px;
    }

    .legend-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .quote-card {
      min-height: 180px;
      padding: 24px;
      background: linear-gradient(180deg, rgba(79,20,15,0.8), rgba(33,8,8,0.95));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .quote-card p {
      margin: 0;
      font-size: 1.35rem;
      line-height: 1.35;
    }

    .quote-card span {
      margin-top: 16px;
      color: var(--gold);
      font-size: 0.92rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .feature-band {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 24px;
    }

    .feature-panel {
      padding: 18px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(45,11,11,0.84), rgba(18,5,5,0.92));
      box-shadow: var(--shadow);
    }

    .feature-panel img {
      width: 100%;
      display: block;
      border-radius: 18px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .gallery-item {
      padding: 14px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(51,12,12,0.76), rgba(17,4,4,0.92));
      box-shadow: var(--shadow);
      transition: transform 0.25s ease;
    }

    .gallery-item:hover {
      transform: translateY(-4px);
    }

    .gallery-item img {
      width: 100%;
      display: block;
      border-radius: 16px;
    }

    .buy-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .step {
      padding: 22px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(50,12,12,0.85), rgba(19,5,5,0.95));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .step-num {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      background: linear-gradient(180deg, #f0cf8f 0%, #c59035 100%);
      color: #2b1200;
      font-weight: 700;
    }

    .step h3 {
      margin: 0 0 8px;
      font-size: 1.22rem;
      color: var(--gold);
    }

    .step p {
      margin: 0;
      line-height: 1.65;
      color: rgba(255, 244, 220, 0.88);
    }

    .cta-panel {
      padding: 28px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(76, 19, 14, 0.82), rgba(20,5,5,0.95));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 22px;
      align-items: center;
    }

    .cta-panel img {
      width: 100%;
      display: block;
      border-radius: 22px;
    }

    .footer {
      padding: 34px 0 60px;
      color: rgba(255,244,220,0.65);
      text-align: center;
      font-size: 0.95rem;
    }

    .muted {
      color: rgba(255,244,220,0.7);
    }

    .tiny {
      font-size: 0.9rem;
    }

    @media (max-width: 980px) {
      .hero-grid,
      .feature-band,
      .cta-panel {
        grid-template-columns: 1fr;
      }

      .legend-grid {
        grid-template-columns: 1fr;
      }

      .buy-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 680px) {
      .nav {
        flex-direction: column;
        align-items: flex-start;
      }

      .gallery-grid,
      .buy-grid {
        grid-template-columns: 1fr;
      }

      .hero {
        padding-top: 32px;
      }

      h1 {
        font-size: 3.4rem;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container nav">
      <div class="brand">
